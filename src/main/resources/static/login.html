<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统 - 登录</title>
    <!-- 引入 Bootstrap 5 CSS 用于快速美化 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 字体图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            /* 保持原有布局代码不变，只修改背景和颜色 */
            background: linear-gradient(135deg,
                #8B5A2B 0%,    /* 深棕色 */
                #A0522D 25%,   /* 赭色 */
                #D2B48C 50%,   /* 米色 */
                #F5DEB3 75%,   /* 小麦色 */
                #FAF0E6 100%   /* 亚麻色 */
            ) !important;  /* 使用!important确保覆盖原有样式 */

            /* 添加纸质纹理 */
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0,0,0,0.05) 0%, transparent 20%),
                linear-gradient(rgba(255,253,245,0.8), rgba(255,253,245,0.8));

            /* 保持原有字体，只修改颜色 */
            color: #5C4033 !important; /* 深棕色文字 */
            font-family: 'Microsoft YaHei', 'SimSun', serif !important;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            /*background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
             在现有的基础上添加古风样式 */
            background: rgba(255, 250, 240, 0.95) !important; /* 旧纸质色，半透明 */
            border: 8px double #8B4513 !important; /* 双线边框，古典风格 */
            border-radius: 12px !important;
            box-shadow:
                0 10px 30px rgba(139, 69, 19, 0.3),
                inset 0 0 30px rgba(210, 180, 140, 0.3) !important;
            position: relative;
            overflow: hidden;
        }
        /* 添加角标装饰（不影响功能） */
        .login-container:before,
        .login-container:after {
            content: "❧";
            position: absolute;
            color: #8B4513;
            font-size: 20px;
            opacity: 0.5;
            z-index: 1;
        }
        .login-container:before {
            top: 10px;
            left: 10px;
        }

        .login-container:after {
            bottom: 10px;
            right: 10px;
            transform: rotate(180deg);
        }
        .login-header h2 {
            /*text-align: center;
            margin-bottom: 2rem;*/
            color: #5C4033 !important; /* 深棕色文字 */
            text-align: center;
            font-family: 'Georgia', 'SimHei', 'Microsoft YaHei', serif !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 15px;
            margin-bottom: 30px !important;
            font-weight: bold;
        }
        /* 标题下方的装饰线 */
        .login-header h2:after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: linear-gradient(to right,
                transparent,
                #8B4513,
                transparent);
        }

        .login-header p {
            color: #8B4513 !important; /* 赭色 */
            font-style: italic;
            opacity: 0.8;
        }
        /*输入框美化*/
        .form-control {
            background-color: #FFF8DC !important; /* 玉米丝绸色 */
            border: 2px solid #D2B48C !important; /* 米色边框 */
            border-radius: 8px !important;
            padding: 12px 15px !important;
            font-size: 16px !important;
            color: #5C4033 !important; /* 深棕色文字 */
            transition: all 0.3s ease !important;
            box-sizing: border-box !important;
        }
        .form-control:focus {
            /*border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);*/
            background-color: #FFFAF0 !important; /* 花白色 */
            border-color: #8B4513 !important; /* 巧克力棕色 */
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1) !important;
            outline: none !important;
        }
        /* 输入框图标位置预留 */
        .mb-3, .mb-4 {
            position: relative;
        }

        .mb-3:before, .mb-4:before {
            content: "";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(5px);
            font-size: 18px;
            color: #8B4513;
            z-index: 10;
        }

        .mb-3:nth-of-type(1):before { content: "👤"; } /* 用户名图标 */
        .mb-4:before { content: "🔒"; } /* 密码图标 */
        /* 调整输入框内边距，为图标留出空间 */
        #username, #password {
            padding-left: 40px !important;
        }
        /*按钮美化*/
        .btn-primary {
            background: linear-gradient(135deg, #8B4513, #A0522D) !important;
            color: white !important;
            border: none !important;
            border-radius: 8px !important;
            padding: 12px 30px !important;
            font-size: 16px !important;
            font-weight: bold !important;
            transition: all 0.3s ease !important;
            position: relative;
            overflow: hidden;
        }

        /* 按钮悬停效果 */
        .btn-primary:hover {
            background: linear-gradient(135deg, #A0522D, #8B4513) !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4) !important;
        }

        /* 按钮点击效果 */
        .btn-primary:active {
            transform: translateY(0) !important;
        }

        /* 按钮加载动画 */
        .btn-primary .spinner-border {
            color: white !important;
            margin-right: 8px;
        }

        /*链接样式*/
        a.text-decoration-none {
            color: #8B4513 !important;
            transition: all 0.3s ease !important;
            position: relative;
            padding-left: 0;
        }
        a.text-decoration-none:hover {
            color: #5C4033 !important;
            text-decoration: underline !important;
            padding-left: 5px;
        }

        a.text-decoration-none:before {
            content: "→";
            position: absolute;
            left: -15px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        a.text-decoration-none:hover:before {
            opacity: 1;
            left: -10px;
        }
        /*模态框美化*/
        .modal-content {
            background: #FAF0E6 !important; /* 亚麻色 */
            border: 3px solid #8B4513 !important;
            border-radius: 10px !important;
        }

        .modal-header {
            background: linear-gradient(135deg, #8B4513, #A0522D) !important;
            color: white !important;
            border-bottom: 2px solid #D2B48C !important;
            border-radius: 7px 7px 0 0 !important;
        }

        .modal-title {
            color: white !important;
            font-weight: bold;
        }

        .modal-body {
            background: #FFF8DC !important; /* 玉米丝绸色 */
        }

        .modal-footer {
            background: #FAF0E6 !important; /* 亚麻色 */
            border-top: 1px solid #D2B48C !important;
            border-radius: 0 0 7px 7px !important;
        }
        /* 模态框输入框 */
        #resetUsername,
        #resetEmail,
        #resetCode,
        #newPassword,
        #confirmPassword {
            background-color: #FFF8DC !important;
            border: 2px solid #D2B48C !important;
            color: #5C4033 !important;
        }

        #resetUsername:focus,
        #resetEmail:focus,
        #resetCode:focus,
        #newPassword:focus,
        #confirmPassword:focus {
            background-color: #FFFAF0 !important;
            border-color: #8B4513 !important;
            box-shadow: 0 0 0 3px rgba(139, 69, 19, 0.1) !important;
        }

        /* 模态框按钮 */
        .modal-footer .btn {
            border-radius: 6px !important;
            transition: all 0.3s ease !important;
        }

        .modal-footer .btn-primary {
            background: #8B4513 !important;
            border: none !important;
        }

        .modal-footer .btn-primary:hover {
            background: #A0522D !important;
            transform: translateY(-2px) !important;
        }

        .modal-footer .btn-secondary {
            background: #D2B48C !important;
            border: none !important;
            color: #5C4033 !important;
        }

        .modal-footer .btn-secondary:hover {
            background: #8B4513 !important;
            color: white !important;
        }

        /* 步骤指示器美化 */
        .step {
            transition: all 0.3s ease;
        }

        /* 消息提示框 */
        .alert {
            border: none !important;
            border-radius: 8px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
        }

        .alert-success {
            background-color: #D4EDDA !important;
            border-left: 4px solid #28a745 !important;
            color: #155724 !important;
        }

        .alert-danger {
            background-color: #F8D7DA !important;
            border-left: 4px solid #dc3545 !important;
            color: #721C24 !important;
        }

        .alert-info {
            background-color: #D1ECF1 !important;
            border-left: 4px solid #17a2b8 !important;
            color: #0c5460 !important;
        }
        body:before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(210, 180, 140, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .book-decoration {
            position: fixed;
            font-size: 24px;
            color: rgba(139, 69, 19, 0.1);
            z-index: -1;
            user-select: none;
            animation: float 6s ease-in-out infinite;
        }

        .book-decoration:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }
        .book-decoration:nth-child(2) {
            top: 20%;
            right: 10%;
            animation-delay: 1s;
        }
        .book-decoration:nth-child(3) {
            bottom: 15%;
            left: 15%;
            animation-delay: 2s;
        }
        .book-decoration:nth-child(4) {
            bottom: 25%;
            right: 5%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .login-container {
                margin: 20px !important;
                padding: 25px 20px !important;
            }

            .form-control {
                font-size: 16px !important;
            }
        }
        #message {
            min-height: 24px;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="login-container">
        <!-- 页面标题 -->
        <div class="login-header">
            <h2>图书管理系统</h2>
            <p class="text-muted">请登录您的账户</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <!-- 用户名输入框 -->
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
            </div>

            <!-- 密码输入框 -->
            <div class="mb-4">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                <span id="btnText">登录</span>
                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>

            <!-- 在登录按钮之后的提示信息和注册链接部分 -->
            <div id="message" class="text-center mb-2"></div>
            <div class="d-flex justify-content-between">
                <div>
                    <a href="register.html" class="text-decoration-none">还没有账户？去注册</a>
                </div>
                <div>
                    <a href="#" class="text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
                        忘记密码？
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- 引入 Bootstrap JS (用于交互组件) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 当页面DOM加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageDiv = document.getElementById('message');

        // 处理表单提交事件
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault(); // 阻止表单默认提交行为（页面跳转）

            // 1. 获取输入的用户名和密码
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // 2. 简单的客户端验证
            if (!username || !password) {
                showMessage('请输入用户名和密码！', 'danger');
                return;
            }

            // 3. 准备发送给后端的数据
            const requestData = {
                username: username,
                password: password
            };

            // 4. 显示"登录中"状态，禁用按钮防止重复提交
            setLoadingState(true);

            try {
                // 5. 调用后端登录API
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData) // 将JS对象转为JSON字符串
                });

                // 6. 解析后端返回的JSON数据
                const result = await response.json();

                // 7. 根据后端返回的 success 字段判断登录结果
                if (result.success) {
                    showMessage(`登录成功！欢迎回来，${result.data.username}。正在跳转...`, 'success');
                    // 登录成功后，跳转到系统首页
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // 登录失败，显示后端返回的错误信息
                    showMessage(`登录失败：${result.message}`, 'danger');
                    setLoadingState(false); // 恢复按钮状态
                }

            } catch (error) {
                // 8. 处理网络错误或API未响应等情况
                console.error('登录请求失败:', error);
                showMessage('网络错误或服务器未响应，请稍后重试。', 'danger');
                setLoadingState(false);
            }
        });

        // 显示提示信息的函数
        function showMessage(text, type) {
            messageDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${text}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        }

        // 设置登录按钮加载状态的函数
        function setLoadingState(isLoading) {
            if (isLoading) {
                btnText.textContent = '登录中...';
                btnSpinner.classList.remove('d-none');
                loginBtn.disabled = true;
            } else {
                btnText.textContent = '登录';
                btnSpinner.classList.add('d-none');
                loginBtn.disabled = false;
            }
        }
    });
</script>

<!-- 忘记密码模态框 -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="forgotPasswordModalLabel">找回密码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- 步骤1：输入用户名和邮箱 -->
                <div id="step1" class="step active">
                    <div class="mb-3">
                        <label for="resetUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="resetUsername" placeholder="请输入您的用户名" required>
                    </div>
                    <div class="mb-3">
                        <label for="resetEmail" class="form-label">注册邮箱</label>
                        <input type="email" class="form-control" id="resetEmail" placeholder="请输入您注册时使用的邮箱" required>
                    </div>
                </div>

                <!-- 步骤2：输入验证码 -->
                <div id="step2" class="step" style="display: none;">
                    <div class="mb-3">
                        <label for="resetCode" class="form-label">验证码</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="resetCode" placeholder="请输入6位验证码" maxlength="6">
                            <button class="btn btn-outline-secondary" type="button" id="sendCodeBtn" onclick="sendResetCode()">发送验证码</button>
                        </div>
                        <div class="form-text text-muted">验证码已发送到您的邮箱，请输入6位数字验证码</div>
                    </div>
                </div>

                <!-- 步骤3：设置新密码 -->
                <div id="step3" class="step" style="display: none;">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">新密码</label>
                        <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码（至少7位）">
                        <div class="form-text text-muted">密码长度至少7位，建议包含字母、数字和特殊字符</div>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">确认新密码</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入新密码">
                    </div>
                </div>

                <div id="resetMessage" class="alert d-none mt-3"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="prevBtn" onclick="prevStep()" style="display: none;">上一步</button>
                <button type="button" class="btn btn-primary" id="nextBtn" onclick="nextStep()">下一步</button>
                <button type="button" class="btn btn-success" id="resetBtn" onclick="handleResetAction()" style="display: none;">验证验证码</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 忘记密码功能
    let currentStep = 1;
    let countdownTimer = null;
    let resetEmail = '';
    let resetUsername = '';
    let isEmailRegistered = false;

    async function nextStep() {
        if (currentStep === 1) {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email || !validateEmail(email)) {
                showResetMessage('请输入有效的邮箱地址', 'danger');
                return;
            }

            resetEmail = email; // 保存邮箱

            // 禁用下一步按钮，防止重复点击
            const nextBtn = document.getElementById('nextBtn');
            const originalText = nextBtn.innerHTML;
            nextBtn.disabled = true;
            nextBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 验证中';

            try {
                // 获取用户名和邮箱
                const username = document.getElementById('resetUsername').value.trim();
                const email = document.getElementById('resetEmail').value.trim();

                // 简单验证
                if (!username || !email || !validateEmail(email)) {
                    showResetMessage('请输入有效的用户名和邮箱地址', 'danger');
                    return;
                }

                // 保存到全局变量
                resetUsername = username;
                resetEmail = email;

                // 发送请求，同时包含用户名和邮箱
                const response = await fetch('/api/auth/forgot-password/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        email: email
                    })
                });

                const result = await response.json();

                // 恢复按钮状态
                nextBtn.disabled = false;
                nextBtn.innerHTML = originalText;

                if (result.success) {
                    // 检查后端是否真的发送了验证码
                    if (result.message === "验证码已发送到邮箱，请查收") {
                        // 邮箱已注册，真的发送了验证码
                        isEmailRegistered = true;
                        showResetMessage('验证码已发送到邮箱，请查收', 'success');

                        // 切换到步骤2
                        document.getElementById('step1').style.display = 'none';
                        document.getElementById('step2').style.display = 'block';
                        document.getElementById('prevBtn').style.display = 'inline-block';
                        document.getElementById('nextBtn').style.display = 'none';
                        document.getElementById('resetBtn').style.display = 'inline-block';
                        currentStep = 2;

                        // 开始倒计时
                        startCountdown();
                    } else if (result.message === "如果邮箱已注册，验证码将发送到您的邮箱") {
                        // 邮箱未注册，但后端返回了假成功
                        isEmailRegistered = false;
                        showResetMessage('该邮箱未注册，请输入已注册的邮箱', 'danger');
                    } else {
                        showResetMessage(result.message, 'info');
                    }
                } else {
                    // 服务器返回了错误
                    showResetMessage('发送失败: ' + result.message, 'danger');

                    // 特殊处理：如果错误是服务器内部错误，但用户可能已收到验证码
                    if (result.message && result.message.includes("服务器内部错误")) {
                        // 询问用户是否已收到验证码
                        setTimeout(() => {
                            const userChoice = confirm("服务器响应异常，但验证码可能已发送。您是否已收到验证码？\n\n点击'确定'继续验证，点击'取消'重新发送。");
                            if (userChoice) {
                                // 用户确认已收到验证码，继续下一步
                                isEmailRegistered = true;
                                document.getElementById('step1').style.display = 'none';
                                document.getElementById('step2').style.display = 'block';
                                document.getElementById('prevBtn').style.display = 'inline-block';
                                document.getElementById('nextBtn').style.display = 'none';
                                document.getElementById('resetBtn').style.display = 'inline-block';
                                currentStep = 2;
                                showResetMessage('请检查邮箱并输入验证码', 'info');
                            }
                        }, 1500);
                    }
                }
            } catch (error) {
                // 恢复按钮状态
                nextBtn.disabled = false;
                nextBtn.innerHTML = originalText;
                showResetMessage('网络错误，请稍后重试', 'danger');
            }
        }
    }

    function prevStep() {
        if (currentStep === 2) {
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('resetBtn').textContent = '验证验证码';
            currentStep = 1;

            // 清空验证码输入框
            document.getElementById('resetCode').value = '';
        } else if (currentStep === 3) {
            document.getElementById('step2').style.display = 'block';
            document.getElementById('step3').style.display = 'none';
            document.getElementById('prevBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').textContent = '验证验证码';
            currentStep = 2;

            // 清空密码输入框
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }
    }

    // 倒计时函数
    function startCountdown() {
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        let countdown = 60;

        // 清除之前的计时器
        if (countdownTimer) {
            clearInterval(countdownTimer);
        }

        countdownTimer = setInterval(() => {
            sendCodeBtn.textContent = `${countdown}秒后重新发送`;
            sendCodeBtn.disabled = true;
            countdown--;

            if (countdown < 0) {
                clearInterval(countdownTimer);
                sendCodeBtn.textContent = '发送验证码';
                sendCodeBtn.disabled = false;
            }
        }, 1000);
    }

    async function sendResetCode() {
        const email = resetEmail;
        const sendCodeBtn = document.getElementById('sendCodeBtn');

        sendCodeBtn.disabled = true;
        sendCodeBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 发送中';

        try {
            const response = await fetch('/api/auth/forgot-password/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: resetUsername,
                    email: resetEmail
                })
            });

            const result = await response.json();
            if (result.success) {
                // 检查后端是否真的发送了验证码
                if (result.message === "验证码已发送到邮箱，请查收") {
                    // 真正的成功，开始倒计时
                    showResetMessage('验证码已发送到邮箱，请查收', 'success');
                    startCountdown();
                } else if (result.message === "如果邮箱已注册，验证码将发送到您的邮箱") {
                    // 邮箱不存在，显示提示
                    showResetMessage('该邮箱未注册，请输入已注册的邮箱', 'danger');
                    // 重置按钮状态
                    setTimeout(() => {
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '发送验证码';
                    }, 1000);
                } else {
                    showResetMessage(result.message, 'info');
                    setTimeout(() => {
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '发送验证码';
                    }, 1000);
                }
            } else {
                // 服务器返回了错误
                showResetMessage('发送失败: ' + result.message, 'danger');

                // 特殊处理：如果错误信息包含网络相关，提示用户可能已发送
                if (result.message && result.message.includes("网络") ||
                    result.message.includes("连接") ||
                    result.message.includes("超时")) {
                    setTimeout(() => {
                        showResetMessage('网络不稳定，如未收到验证码请重新发送', 'warning');
                    }, 2000);
                }

                sendCodeBtn.disabled = false;
                sendCodeBtn.textContent = '发送验证码';
            }
        } catch (error) {
            showResetMessage('网络错误，请稍后重试', 'danger');
            sendCodeBtn.disabled = false;
            sendCodeBtn.textContent = '发送验证码';
        }
    }

    // 验证验证码
    async function verifyResetCode(code) {
        try {
            const response = await fetch('/api/auth/forgot-password/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: resetUsername,
                    email: resetEmail,
                    code: code
                })
            });

            const result = await response.json();
            if (result.success) {
                showResetMessage('验证码验证成功，请设置新密码', 'success');
                return true;
            } else {
                showResetMessage('验证码错误: ' + result.message, 'danger');
                return false;
            }
        } catch (error) {
            showResetMessage('网络错误，请稍后重试', 'danger');
            return false;
        }
    }

    // 修改handleResetAction函数
    async function handleResetAction() {
        if (currentStep === 2) {
            // 当前是步骤2，验证验证码
            const code = document.getElementById('resetCode').value.trim();
            if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
                showResetMessage('请输入6位数字验证码', 'danger');
                return;
            }

            // 验证验证码
            const isValid = await verifyResetCode(code);
            if (isValid) {
                showResetMessage('验证码验证成功，请设置新密码', 'success');

                // 清空验证码输入框
                document.getElementById('resetCode').value = '';

                // 切换到步骤3（设置新密码）
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
                document.getElementById('resetBtn').textContent = '重置密码';
                document.getElementById('prevBtn').style.display = 'inline-block';
                currentStep = 3;

                return true;
            } else {
                return false;
            }

        } else if (currentStep === 3) {
            // 当前是步骤3，重置密码
            await resetPassword();
        }
    }

    // 修改resetPassword函数，移除验证码参数
    async function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // 验证密码
        if (newPassword.length < 7) {
            showResetMessage('密码长度不能少于7位', 'danger');
            return;
        }

        if (newPassword !== confirmPassword) {
            showResetMessage('两次输入的密码不一致', 'danger');
            return;
        }

        // 重置按钮状态
        const resetBtn = document.getElementById('resetBtn');
        const originalText = resetBtn.innerHTML;
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 重置中';

        // 重置密码（不发送验证码）
        try {
            const response = await fetch('/api/auth/forgot-password/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: resetUsername,
                    email: resetEmail,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                })
            });

            const result = await response.json();

            // 恢复按钮状态
            resetBtn.disabled = false;
            resetBtn.innerHTML = originalText;

            if (result.success) {
                showResetMessage('密码重置成功！请使用新密码登录', 'success');
                // 重置表单并关闭模态框
                setTimeout(() => {
                    resetForm();
                    const modal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
                    modal.hide();

                    // 清空登录表单
                    document.getElementById('username').value = '';
                    document.getElementById('password').value = '';
                }, 2000);
            } else {
                showResetMessage('重置失败: ' + result.message, 'danger');

                // 如果是验证过期，回到步骤1
                if (result.message.includes("验证已过期") || result.message.includes("请重新获取验证码")) {
                    showResetMessage('验证已过期，请重新开始', 'warning');
                    setTimeout(() => {
                        resetForm();
                    }, 1500);
                }
            }
        } catch (error) {
            // 恢复按钮状态
            resetBtn.disabled = false;
            resetBtn.innerHTML = originalText;
            showResetMessage('网络错误，请稍后重试', 'danger');
        }
    }

    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }

    function showResetMessage(message, type) {
        const messageDiv = document.getElementById('resetMessage');
        messageDiv.textContent = message;
        messageDiv.className = `alert alert-${type} mt-3`;
        messageDiv.classList.remove('d-none');

        // 3秒后自动隐藏
        if (type === 'success') {
            setTimeout(() => {
                messageDiv.classList.add('d-none');
            }, 3000);
        }
    }

    // 重置表单函数
    function resetForm() {
        document.getElementById('resetEmail').value = '';
        document.getElementById('resetCode').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';

        // 重置到步骤1
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';

        // 重置按钮
        document.getElementById('prevBtn').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('resetBtn').textContent = '验证验证码';

        currentStep = 1;
        resetEmail = '';
        resetUsername = '';
        isEmailRegistered = false;

        // 隐藏消息
        document.getElementById('resetMessage').classList.add('d-none');

        // 重置发送验证码按钮
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        sendCodeBtn.textContent = '发送验证码';
        sendCodeBtn.disabled = false;

        // 停止计时器
        if (countdownTimer) {
            clearInterval(countdownTimer);
            countdownTimer = null;
        }
    }

    // 模态框关闭时重置状态
    document.getElementById('forgotPasswordModal').addEventListener('hidden.bs.modal', function () {
        resetForm();
    });
</script>
</body>
